<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navbar Responsive</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f5;
}

/*=========================
        NAVBAR
=========================*/

.navbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:90px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 40px;

    background:rgba(255,255,255,.95);
    backdrop-filter:blur(12px);

    box-shadow:0 5px 15px rgba(0,0,0,.08);

    z-index:999;
}

/* Logo */

.logo{
    display:flex;
    align-items:center;
    gap:15px;

    font-size:28px;
    font-weight:bold;
    color:#27ae60;
}

.logo img{
    height:70px;
    width:auto;
}

/* Menú escritorio */

.menu{
    display:flex;
    list-style:none;
    gap:35px;
}

.menu a{
    text-decoration:none;
    color:#333;
    font-size:17px;
    font-weight:600;
    transition:.3s;
}

.menu a:hover{
    color:#27ae60;
}

/* Botón hamburguesa */

.menu-toggle{
    display:none;
    background:none;
    border:none;
    cursor:pointer;
    font-size:28px;
    color:#333;
}

/*=========================
      RESPONSIVE
=========================*/

@media(max-width:768px){

    .navbar{
        height:80px;
        padding:0 20px;
    }

    .logo{
        font-size:22px;
    }

    .logo img{
        height:60px;
    }

    .menu-toggle{
        display:block;
    }

    .menu{
        position:absolute;
        top:80px;
        left:0;

        width:100%;

        display:none;
        flex-direction:column;

        background:#fff;

        box-shadow:0 8px 20px rgba(0,0,0,.1);
    }

    .menu.active{
        display:flex;
        animation:abrir .3s ease;
    }

    .menu li{
        border-bottom:1px solid #eee;
    }

    .menu li:last-child{
        border-bottom:none;
    }

    .menu a{
        display:block;
        padding:18px 20px;
    }

    .menu a:hover{
        background:#27ae60;
        color:#fff;
    }

}

@keyframes abrir{

    from{
        opacity:0;
        transform:translateY(-10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

main{
    padding-top:120px;
    text-align:center;
}
</style>

</head>
<body>

<nav class="navbar">

    <div class="logo">
        <img src="logon.jpg" alt="Logo">
        <span>E-Clean</span>
    </div>

    <button class="menu-toggle" id="btnMenu">
        <i class="fas fa-bars"></i>
    </button>

    <ul class="menu" id="menu">
        <li><a href="#inicio">Inicio</a></li>
        <li><a href="#producto">Producto</a></li>
        <li><a href="#beneficios">Beneficios</a></li>
        <li><a href="#contacto">Contacto</a></li>
    </ul>

</nav>

<main>

<h1>Contenido de la página</h1>
<p>El menú permanece fijo y es responsive.</p>

</main>

<script>

const boton = document.getElementById("btnMenu");
const menu = document.getElementById("menu");

boton.addEventListener("click", ()=>{

    menu.classList.toggle("active");

});

// Cierra el menú al seleccionar una opción en móvil
document.querySelectorAll(".menu a").forEach(item=>{

    item.addEventListener("click",()=>{

        menu.classList.remove("active");

    });

});

</script>

</body>
</html>
